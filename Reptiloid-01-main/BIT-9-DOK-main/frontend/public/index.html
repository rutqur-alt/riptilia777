<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <meta name="theme-color" content="#10B981" />
        <meta name="description" content="BITARBITR - P2P платформа для обмена криптовалют" />
        
        <!-- PWA Meta Tags -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="BITARBITR" />
        
        <!-- Icons -->
        <link rel="icon" href="%PUBLIC_URL%/icons/icon-72x72.png" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-152x152.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icons/icon-192x192.png" />
        <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/icons/icon-192x192.png" />
        
        <!-- Manifest -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        
        <title>BITARBITR | P2P Обмен</title>
    </head>
    <body>
        <noscript>Для работы приложения необходимо включить JavaScript.</noscript>
        <div id="root"></div>
        
        <!-- Service Worker Registration & PWA Install Prompt -->
        <script>
            // Capture beforeinstallprompt event BEFORE React loads
            window.deferredInstallPrompt = null;
            window.addEventListener('beforeinstallprompt', (e) => {
                console.log('PWA: beforeinstallprompt captured globally!');
                e.preventDefault();
                window.deferredInstallPrompt = e;
            });

            // Register Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js')
                        .then((registration) => {
                            console.log('SW registered:', registration.scope);
                        })
                        .catch((error) => {
                            console.log('SW registration failed:', error);
                        });
                });
            }
        </script>
    </body>
</html>
